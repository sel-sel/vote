<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>職場演練 - 學生投票系統</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body {
            font-family: "微軟正黑體", sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        h2 { margin-bottom: 10px; color: #4CAF50; }

        /* 狀態提示框 */
        #status-container {
            width: 90%;
            max-width: 400px;
            background: #333;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #555;
        }
        #status-label {
            font-size: 1.2rem;
            font-weight: bold;
            color: #aaa;
        }

        /* 隊伍選擇區 */
        .group-select {
            margin-bottom: 20px;
            background: #2c3e50;
            padding: 10px;
            border-radius: 8px;
        }
        select {
            font-size: 1.1rem;
            padding: 5px 10px;
            border-radius: 5px;
        }

        /* 按鈕網格：順時鐘排列 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .emotion-btn {
            height: 100px;
            font-size: 1.4rem;
            font-weight: bold;
            color: white;
            background-color: #444;
            border: 2px solid #666;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .emotion-btn:active { transform: scale(0.95); }
        .emotion-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* 點選後的顏色 */
        .selected {
            background-color: #2196F3 !important;
            border-color: #fff !important;
            box-shadow: 0 0 15px rgba(33, 150, 243, 0.5);
        }

        .btn-num { font-size: 0.9rem; color: #bbb; margin-bottom: 5px; }
    </style>
</head>
<body>

    <h2>🗳️ 情緒投票</h2>

    <div class="group-select">
        <label>我是第 </label>
        <select id="group-id">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
        </select>
        <label> 隊</label>
    </div>

    <div id="status-container">
        <div id="status-label">等待老師抽題中...</div>
    </div>

    <div class="grid-container">
        <button class="emotion-btn" id="btn-0" onclick="vote(0)" disabled>
            <span class="btn-num">① 正上</span><span class="text">---</span>
        </button>
        <button class="emotion-btn" id="btn-1" onclick="vote(1)" disabled>
            <span class="btn-num">② 右上</span><span class="text">---</span>
        </button>
        <button class="emotion-btn" id="btn-5" onclick="vote(5)" disabled>
            <span class="btn-num">⑥ 左上</span><span class="text">---</span>
        </button>
        <button class="emotion-btn" id="btn-2" onclick="vote(2)" disabled>
            <span class="btn-num">③ 右下</span><span class="text">---</span>
        </button>
        <button class="emotion-btn" id="btn-4" onclick="vote(4)" disabled>
            <span class="btn-num">⑤ 左下</span><span class="text">---</span>
        </button>
        <button class="emotion-btn" id="btn-3" onclick="vote(3)" disabled>
            <span class="btn-num">④ 正下</span><span class="text">---</span>
        </button>
    </div>

    <script>
        const ABLY_KEY = 'bHcXGQ.1E5LxA:MTgbAhdb5kDHqeL91xshPWSuAqZihv_SMGB0693bBZE';
        const ably = new Ably.Realtime(ABLY_KEY);
        const channel = ably.channels.get('emotion-voting');

        let hasVoted = false;
        let currentEmotions = [];

        // --- 接收 Python 端抽題訊號 ---
        channel.subscribe('update_labels', (message) => {
            const data = message.data.data; // 這是 Python 傳來的列表
            currentEmotions = data;

            // 1. 更新狀態文字：已重新抽題
            const statusLabel = document.getElementById('status-label');
            statusLabel.innerText = "✅ 已重新抽題！請點選";
            statusLabel.style.color = "#FFD700"; // 金色

            // 2. 更新按鈕文字
            data.forEach(item => {
                const btn = document.getElementById(`btn-${item.index}`);
                if (btn) {
                    const textSpan = btn.querySelector('.text');
                    textSpan.innerText = item.emotion;
                    btn.disabled = false;
                    btn.classList.remove('selected'); // 清除上次點選狀態
                }
            });

            hasVoted = false; // 開放本輪投票
            console.log("接收到新題目");
        });

        // --- 投票功能 ---
        function vote(index) {
            if (hasVoted) {
                alert("本輪已投過票囉！請等老師重新抽題。");
                return;
            }

            const groupId = document.getElementById('group-id').value;
            const emotionText = currentEmotions[index].emotion;
            const labels = ["①", "②", "③", "④", "⑤", "⑥"];

            // 傳送投票給 Python
            channel.publish('update', {
                choice: labels[index],
                group: groupId,
                emotion: emotionText
            });

            // 介面回饋
            hasVoted = true;
            document.getElementById(`btn-${index}`).classList.add('selected');
            document.getElementById('status-label').innerText = "投票完成，等待下一題";
            document.getElementById('status-label').style.color = "#4CAF50";
        }
    </script>
</body>
</html>
