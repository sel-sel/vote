<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情緒投票系統</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 10px; }
        h2 { margin: 15px 0; font-size: 1.2rem; color: #F1C40F; }
        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            padding: 10px; 
            max-width: 500px; 
            margin: 0 auto; 
        }
        .vote-card {
            background: #2a2a2a;
            border-radius: 15px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .emotion-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 12px;
            background: #333;
        }
        button { 
            width: 100%;
            height: 55px; 
            font-size: 24px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            color: white; 
            font-weight: bold; 
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        button:disabled { background: #555 !important; color: #888; cursor: not-allowed; }
        
        .btn1 { background: #FF5252; } .btn2 { background: #FF9800; }
        .btn3 { background: #F1C40F; color: black; } .btn4 { background: #4CAF50; }
        .btn5 { background: #2196F3; } .btn6 { background: #9C27B0; }
        
        #msg { font-size: 18px; margin-top: 15px; height: 25px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>請根據螢幕顯示選擇情緒</h2>
    <div class="grid">
        <div class="vote-card"><img src="fig1.jpg" class="emotion-img"><button class="btn1" onclick="vote('①')">①</button></div>
        <div class="vote-card"><img src="fig2.jpg" class="emotion-img"><button class="btn2" onclick="vote('②')">②</button></div>
        <div class="vote-card"><img src="fig3.jpg" class="emotion-img"><button class="btn3" onclick="vote('③')">③</button></div>
        <div class="vote-card"><img src="fig4.jpg" class="emotion-img"><button class="btn4" onclick="vote('④')">④</button></div>
        <div class="vote-card"><img src="fig5.jpg" class="emotion-img"><button class="btn5" onclick="vote('⑤')">⑤</button></div>
        <div class="vote-card"><img src="fig6.jpg" class="emotion-img"><button class="btn6" onclick="vote('⑥')">⑥</button></div>
    </div>
    <p id="msg"></p>

    <script>
        const ABLY_KEY = 'PYZbg.h6MwRg:tCDDGL5lPEBQGvluW3NUmTkNtI2OPoVQuLk02msyWOI';
        const ably = new Ably.Realtime(ABLY_KEY);
        const channel = ably.channels.get('emotion-voting');

        function vote(choice) {
            const msgEl = document.getElementById('msg');
            const btns = document.querySelectorAll('button');
            btns.forEach(b => b.disabled = true);
            msgEl.innerText = "傳送中...";
            msgEl.style.color = "#F1C40F";

            channel.publish('update', { choice: choice }, (err) => {
                if (err) {
                    msgEl.innerText = "傳送失敗";
                    msgEl.style.color = "#FF5252";
                    btns.forEach(b => b.disabled = false);
                } else {
                    msgEl.innerText = "✅ 成功投給 " + choice;
                    msgEl.style.color = "#4CAF50";
                    setTimeout(() => {
                        btns.forEach(b => b.disabled = false);
                        msgEl.innerText = "";
                    }, 3000);
                }
            });
        }
    </script>
</body>
</html>
