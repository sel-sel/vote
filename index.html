<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共感戰場 - 投票區</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { 
            font-family: 'Microsoft JhengHei', sans-serif; 
            background-color: #1a1a1a; 
            color: white; 
            text-align: center; 
            margin: 0; 
            padding: 10px; 
        }
        h2 { color: #F1C40F; margin-top: 5px; margin-bottom: 15px; }
        
        /* 情境顯示區塊 */
        #scenario-display { 
            background: #2c3e50; 
            padding: 15px; 
            border-radius: 8px; 
            margin: 0 auto 20px auto; 
            max-width: 450px; 
            display: none; 
            text-align: left; 
            border-left: 6px solid #F1C40F; 
        }
        #sd-role { font-size: 0.9em; margin-bottom: 8px; font-weight: bold; }
        #sd-text { font-size: 1.1em; line-height: 1.4; color: #FFF; }

        /* 六角形地圖區塊 */
        #voting-map { 
            position: relative; 
            width: 100%; 
            max-width: 400px; 
            margin: 0 auto 20px auto; 
        }
        #voting-map img { width: 100%; display: block; }
        
        /* 浮動在圖案上的文字標籤 */
        .emo-label {
            position: absolute;
            font-weight: 900;
            color: #000;
            text-align: center;
            font-size: 16px;
            /* 白色描邊讓文字在圖案上更清楚 */
            text-shadow: 1px 1px 2px white, -1px -1px 2px white, 1px -1px 2px white, -1px 1px 2px white;
            transform: translate(-50%, -50%);
            pointer-events: none;
            width: 100px;
        }

        /* 投票按鈕區塊 */
        .btn-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            max-width: 400px; 
            margin: auto; 
        }
        button {
            padding: 15px; 
            font-size: 18px; 
            font-weight: bold; 
            border: none; 
            border-radius: 8px;
            background-color: #2980b9; 
            color: white; 
            cursor: pointer; 
            box-shadow: 0 4px #1f6391;
        }
        button:active { 
            box-shadow: 0 0 #1f6391; 
            transform: translateY(4px); 
        }
    </style>
</head>
<body>

    <h2>🎭 共感戰場 - 學生端</h2>
    
    <div id="scenario-display">
        <div id="sd-role"></div>
        <div id="sd-text">等待老師觸發情境...</div>
    </div>

    <div id="voting-map">
        <img src="hexagon_base.png" alt="六角形">
        
        <div id="label-0" class="emo-label" style="top: 15%; left: 50%;"></div>
        <div id="label-1" class="emo-label" style="top: 35%; left: 82%;"></div>
        <div id="label-2" class="emo-label" style="top: 65%; left: 82%;"></div>
        <div id="label-3" class="emo-label" style="top: 85%; left: 50%;"></div>
        <div id="label-4" class="emo-label" style="top: 65%; left: 18%;"></div>
        <div id="label-5" class="emo-label" style="top: 35%; left: 18%;"></div>
    </div>

    <div class="btn-grid">
        <button onclick="vote('①')">投給 ①</button>
        <button onclick="vote('②')">投給 ②</button>
        <button onclick="vote('③')">投給 ③</button>
        <button onclick="vote('④')">投給 ④</button>
        <button onclick="vote('⑤')">投給 ⑤</button>
        <button onclick="vote('⑥')">投給 ⑥</button>
    </div>

    <script>
        // 設定相同的 Ably Key
        const API_KEY = 'bHcXGQ.1E5LxA:MTgbAhdb5kDHqeL91xshPWSuAqZihv_SMGB0693bBZE';
        const realtime = new Ably.Realtime(API_KEY);
        const channel = realtime.channels.get('emotion-voting');

        // 監聽 1：當老師端「抽籤」或「有人投票」時，更新圖片上的文字
        channel.subscribe('update_labels', (msg) => {
            const dataList = msg.data.data;
            dataList.forEach(item => {
                const el = document.getElementById(`label-${item.index}`);
                if (el) {
                    // 把情緒跟票數塞進透明方塊裡
                    el.innerHTML = `${item.label}<br>${item.emotion}<br><span style="font-size: 0.85em; color: #d32f2f;">(${item.count}票)</span>`;
                }
            });
        });

        // 監聽 2：當老師點選「角色」時，秀出當前情境對話
        channel.subscribe('sync_scenario', (msg) => {
            const box = document.getElementById('scenario-display');
            box.style.display = 'block'; // 顯示原本隱藏的方塊
            box.style.borderLeftColor = msg.data.color; // 配合角色顏色
            
            document.getElementById('sd-role').innerText = msg.data.role_intro;
            document.getElementById('sd-role').style.color = msg.data.color;
            document.getElementById('sd-text').innerText = msg.data.scenario_text;
        });

        // 學生點擊按鈕，發送投票訊號給老師
        function vote(choice) {
            channel.publish('update', { choice: choice }, (err) => {
                if (err) {
                    alert('投票失敗，請檢查網路');
                } else {
                    // 手機震動回饋 (部分手機支援)
                    if (navigator.vibrate) navigator.vibrate(50);
                }
            });
        }
    </script>
</body>
</html>
