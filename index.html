<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職場演練投票系統</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { font-family: "微軟正黑體", sans-serif; background-color: #222; color: white; text-align: center; margin: 0; padding: 10px; }
        
        /* 保持您原本的圖片容器 */
        .fig-container { position: relative; width: 350px; height: 350px; margin: 20px auto; }
        .fig-img { width: 100%; height: 100%; object-fit: contain; }

        /* 狀態顯示區 - 這是新添加的文字提示 */
        #status-bar { 
            background: #444; padding: 10px; margin: 10px auto; width: 90%; 
            border-radius: 5px; font-weight: bold; color: #00FF00;
        }

        /* 隊伍選擇區 */
        .group-box { margin: 15px; font-size: 18px; }
        select { font-size: 18px; padding: 5px; }

        /* 按鈕佈局 - 保持您原本的樣式 */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; margin: 0 auto; }
        .vote-btn { 
            padding: 20px; font-size: 20px; font-weight: bold; border-radius: 10px; 
            border: none; background-color: #555; color: white; cursor: pointer;
        }
        .vote-btn:active { background-color: #2196F3; }
        .vote-btn:disabled { background-color: #333; color: #777; }
        
        .selected { background-color: #2196F3 !important; border: 2px solid white; }
    </style>
</head>
<body>

    <h2>職場演練投票</h2>

    <div class="group-box">
        我是第 <select id="group-id">
            <option value="1">1</option><option value="2">2</option>
            <option value="3">3</option><option value="4">4</option>
            <option value="5">5</option><option value="6">6</option>
        </select> 隊
    </div>

    <div id="status-bar" id="msg-display">請等待老師抽題...</div>

    <div class="fig-container">
        <img src="hexagon_base.png" class="fig-img" alt="情緒圖卡">
    </div>

    <div class="btn-grid">
        <button id="btn-0" class="vote-btn" onclick="sendVote(0)" disabled>① ---</button>
        <button id="btn-1" class="vote-btn" onclick="sendVote(1)" disabled>② ---</button>
        <button id="btn-5" class="vote-btn" onclick="sendVote(5)" disabled>⑥ ---</button>
        <button id="btn-2" class="vote-btn" onclick="sendVote(2)" disabled>③ ---</button>
        <button id="btn-4" class="vote-btn" onclick="sendVote(4)" disabled>⑤ ---</button>
        <button id="btn-3" class="vote-btn" onclick="sendVote(3)" disabled>④ ---</button>
    </div>

    <script>
        const ABLY_KEY = 'bHcXGQ.1E5LxA:MTgbAhdb5kDHqeL91xshPWSuAqZihv_SMGB0693bBZE';
        const ably = new Ably.Realtime(ABLY_KEY);
        const channel = ably.channels.get('emotion-voting');

        let emotions = [];
        let hasVoted = false;

        // 接收抽題訊號
        channel.subscribe('update_labels', (message) => {
            emotions = message.data.data;
            
            // 【修正重點】變更文字為「已重新抽題」
            const statusBar = document.getElementById('status-bar');
            statusBar.innerText = "✨ 已重新抽題！請點選情緒";
            statusBar.style.color = "#FFD700"; // 金色提示

            // 更新按鈕文字並啟用
            emotions.forEach(item => {
                const btn = document.getElementById(`btn-${item.index}`);
                if (btn) {
                    btn.innerText = getLabel(item.index) + " " + item.emotion;
                    btn.disabled = false;
                    btn.classList.remove('selected');
                }
            });
            hasVoted = false;
        });

        function getLabel(idx) {
            return ["①", "②", "③", "④", "⑤", "⑥"][idx];
        }

        function sendVote(idx) {
            if (hasVoted) return;
            const groupId = document.getElementById('group-id').value;
            
            channel.publish('update', {
                choice: getLabel(idx),
                group: groupId,
                emotion: emotions[idx].emotion
            });

            hasVoted = true;
            document.getElementById(`btn-${idx}`).classList.add('selected');
            document.getElementById('status-bar').innerText = "投票完成，請觀察大螢幕";
            document.getElementById('status-bar').style.color = "#4CAF50";
        }
    </script>
</body>
</html>
