<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情緒投票系統</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        h2 { margin-top: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; max-width: 500px; margin: 0 auto; }
        button { height: 100px; font-size: 32px; border: none; border-radius: 15px; cursor: pointer; color: white; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.9); }
        button:disabled { background: #555 !important; color: #888; cursor: not-allowed; }
        .btn1 { background: #FF5252; } .btn2 { background: #FF9800; }
        .btn3 { background: #FFEB3B; color: black; } .btn4 { background: #4CAF50; }
        .btn5 { background: #2196F3; } .btn6 { background: #9C27B0; }
        #msg { font-size: 20px; margin-top: 20px; height: 30px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>請選擇最符合的情緒</h2>
    <div class="grid">
        <button class="btn1" onclick="vote('①')">①</button>
        <button class="btn2" onclick="vote('②')">②</button>
        <button class="btn3" onclick="vote('③')">③</button>
        <button class="btn4" onclick="vote('④')">④</button>
        <button class="btn5" onclick="vote('⑤')">⑤</button>
        <button class="btn6" onclick="vote('⑥')">⑥</button>
    </div>
    <p id="msg"></p>

    <script>
        // --- 修正點：API Key 必須包含在引號 '' 裡面 ---
        const ABLY_KEY = 'PYZbg.h6MwRg:tCDDGL5lPEBQGvluW3NUmTkNtI2OPoVQuLk02msyWOI';
        
        const ably = new Ably.Realtime(ABLY_KEY);
        const channel = ably.channels.get('emotion-voting');

        function vote(choice) {
            const msgEl = document.getElementById('msg');
            const btns = document.querySelectorAll('button');

            // 1. 按下立刻鎖定按鈕並顯示處理中
            btns.forEach(b => b.disabled = true);
            msgEl.innerText = "傳送中...";
            msgEl.style.color = "#FFEB3B";

            // 2. 發送訊息到 Ably
            channel.publish('update', { choice: choice }, (err) => {
                if (err) {
                    msgEl.innerText = "投票失敗，請檢查網路";
                    msgEl.style.color = "#FF5252";
                    btns.forEach(b => b.disabled = false);
                } else {
                    msgEl.innerText = "✅ 投票成功！你選了 " + choice;
                    msgEl.style.color = "#4CAF50";
                    
                    // 3. 成功後等 3 秒才解除鎖定，避免連點
                    setTimeout(() => {
                        btns.forEach(b => b.disabled = false);
                        msgEl.innerText = "";
                    }, 3000);
                }
            });
        }
    </script>
</body>
</html>
