<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職場情緒演練-學生端</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 10px; user-select: none; }
        .group-selector { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .group-btn { width: 65px; height: 40px; background: #333; border: 1px solid #555; color: white; border-radius: 5px; cursor: pointer; }
        .group-btn.active { background: #F1C40F; color: black; border-color: #FFF; }
        .hexagon-container { position: relative; width: 320px; height: 380px; margin: 0 auto; }
        .vote-card { position: absolute; width: 100px; cursor: pointer; opacity: 0.15; pointer-events: none; transition: 0.3s; }
        .vote-card.ready { opacity: 1; pointer-events: auto; }
        .pos1 { top: 0px; left: 110px; } .pos2 { top: 60px; left: 215px; } .pos3 { top: 230px; left: 215px; }
        .pos4 { bottom: 10px; left: 110px; } .pos5 { top: 230px; left: 5px; } .pos6 { top: 60px; left: 5px; }
        .emotion-img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #444; background: #333; }
        .vote-card.selected .emotion-img { border-color: #FFF; box-shadow: 0 0 15px #F1C40F; transform: scale(1.1); }
        .dynamic-text { font-size: 18px; font-weight: bold; margin-top: 5px; }
        #submit-btn { margin-top: 20px; padding: 12px 40px; font-size: 20px; background: #27AE60; color: white; border: none; border-radius: 30px; display: none; }
        #msg { margin-top: 15px; color: #F1C40F; font-weight: bold; }
    </style>
</head>
<body>
    <h2 id="hint">1. 請先點選隊別</h2>
    <div class="group-selector">
        <button class="group-btn" onclick="selectGroup(1, this)">1隊</button>
        <button class="group-btn" onclick="selectGroup(2, this)">2隊</button>
        <button class="group-btn" onclick="selectGroup(3, this)">3隊</button>
        <button class="group-btn" onclick="selectGroup(4, this)">4隊</button>
        <button class="group-btn" onclick="selectGroup(5, this)">5隊</button>
        <button class="group-btn" onclick="selectGroup(6, this)">6隊</button>
    </div>

    <div class="hexagon-container">
        <div class="vote-card pos1" onclick="selectEmotion('①', this)"><img src="fig1.jpg" class="emotion-img"><div id="t0" class="dynamic-text"></div></div>
        <div class="vote-card pos2" onclick="selectEmotion('②', this)"><img src="fig2.jpg" class="emotion-img"><div id="t1" class="dynamic-text"></div></div>
        <div class="vote-card pos3" onclick="selectEmotion('③', this)"><img src="fig3.jpg" class="emotion-img"><div id="t2" class="dynamic-text"></div></div>
        <div class="vote-card pos4" onclick="selectEmotion('④', this)"><img src="fig4.jpg" class="emotion-img"><div id="t3" class="dynamic-text"></div></div>
        <div class="vote-card pos5" onclick="selectEmotion('⑤', this)"><img src="fig5.jpg" class="emotion-img"><div id="t4" class="dynamic-text"></div></div>
        <div class="vote-card pos6" onclick="selectEmotion('⑥', this)"><img src="fig6.jpg" class="emotion-img"><div id="t5" class="dynamic-text"></div></div>
    </div>

    <button id="submit-btn" onclick="finalSubmit()">確定送出</button>
    <p id="msg"></p>

    <script>
        const ably = new Ably.Realtime('bHcXGQ.1E5LxA:MTgbAhdb5kDHqeL91xshPWSuAqZihv_SMGB0693bBZE');
        const channel = ably.channels.get('emotion-voting');
        let currentGroup = null, currentChoice = null, currentEmo = "", hasEmotions = false;

        function selectGroup(num, btn) {
            currentGroup = num;
            document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('msg').innerText = "已選擇第 " + num + " 隊";
            checkReady();
        }

        channel.subscribe('update_labels', (msg) => {
            hasEmotions = true;
            msg.data.data.forEach(item => { document.getElementById(`t${item.index}`).innerText = item.emotion; });
            document.querySelectorAll('.vote-card').forEach(v => { v.classList.add('ready'); v.classList.remove('selected'); });
            document.getElementById('hint').innerText = "2. 請點擊圖片選擇情緒";
            checkReady();
        });

        function checkReady() {
            if (currentGroup && hasEmotions) {
                document.querySelectorAll('.vote-card').forEach(v => v.classList.add('ready'));
            }
        }

        function selectEmotion(choice, el) {
            currentChoice = choice;
            currentEmo = el.querySelector('.dynamic-text').innerText;
            document.querySelectorAll('.vote-card').forEach(v => v.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('submit-btn').style.display = "inline-block";
        }

        function finalSubmit() {
            channel.publish('update', { group: currentGroup, choice: currentChoice, emotion: currentEmo }, (err) => {
                if (!err) {
                    document.getElementById('msg').innerText = "✅ 送出成功！期待老師解說";
                    document.getElementById('submit-btn').style.display = "none";
                    document.querySelectorAll('.vote-card').forEach(v => v.classList.remove('ready'));
                    hasEmotions = false;
                }
            });
        }
    </script>
</body>
</html>
