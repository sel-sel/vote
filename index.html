<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情緒投票系統-圖片按鈕版</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            text-align: center; 
            background: #1a1a1a; 
            color: white; 
            margin: 0; 
            padding: 10px; 
            overflow-x: hidden; 
        }
        h2 { margin: 15px 0; font-size: 1.2rem; color: #F1C40F; }
        
        .hexagon-container {
            position: relative;
            width: 380px; 
            height: 460px; 
            margin: 10px auto;
        }

        .vote-card {
            position: absolute;
            width: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer; /* 滑鼠移上去變成手指 */
        }

        /* 座標位置 (維持 2,6 號調高) */
        .pos1 { top: 0px; left: 130px; }
        .pos2 { top: 65px; left: 260px; }
        .pos6 { top: 65px; left: 0px; }
        .pos3 { top: 255px; left: 260px; }
        .pos5 { top: 255px; left: 0px; }
        .pos4 { bottom: 10px; left: 130px; }

        .emotion-img {
            width: 100px; /* 圖片變大一點點作為按鈕 */
            height: 100px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #444;
            background: #333;
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
            transition: transform 0.1s, border-color 0.2s;
        }

        /* 點擊圖片時的縮放效果 */
        .vote-card:active .emotion-img {
            transform: scale(0.9);
            border-color: #F1C40F;
        }

        /* 停用狀態 (傳送中) */
        .disabled {
            pointer-events: none;
            opacity: 0.6;
        }

        .dynamic-text {
            font-size: 20px; 
            font-weight: bold;
            margin-top: 10px;
            height: 26px; 
            text-shadow: 1px 1px 3px black;
        }

        /* 各別文字顏色設定 */
        #t0 { color: #A569BD; } /* 1. 紫色 */
        #t1 { color: #EC7063; } /* 2. 紅色 */
        #t2 { color: #85C1E9; } /* 3. 淡藍 */
        #t3 { color: #52BE80; } /* 4. 綠色 */
        #t4 { color: #F5B7B1; } /* 5. 粉紅 */
        #t5 { color: #D4AC0D; } /* 6. 土色 */
        
        #msg { font-size: 18px; margin-top: 15px; height: 25px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>請點選對應位置的情緒圖片</h2>
    
    <div class="hexagon-container" id="main-grid">
        <div class="vote-card pos1" onclick="vote('①', this)"><img src="fig1.jpg" class="emotion-img"><div id="t0" class="dynamic-text"></div></div>
        <div class="vote-card pos2" onclick="vote('②', this)"><img src="fig2.jpg" class="emotion-img"><div id="t1" class="dynamic-text"></div></div>
        <div class="vote-card pos3" onclick="vote('③', this)"><img src="fig3.jpg" class="emotion-img"><div id="t2" class="dynamic-text"></div></div>
        <div class="vote-card pos4" onclick="vote('④', this)"><img src="fig4.jpg" class="emotion-img"><div id="t3" class="dynamic-text"></div></div>
        <div class="vote-card pos5" onclick="vote('⑤', this)"><img src="fig5.jpg" class="emotion-img"><div id="t4" class="dynamic-text"></div></div>
        <div class="vote-card pos6" onclick="vote('⑥', this)"><img src="fig6.jpg" class="emotion-img"><div id="t5" class="dynamic-text"></div></div>
    </div>

    <p id="msg"></p>

    <script>
        const ABLY_KEY = 'bHcXGQ.1E5LxA:MTgbAhdb5kDHqeL91xshPWSuAqZihv_SMGB0693bBZE';
        const ably = new Ably.Realtime(ABLY_KEY);
        const channel = ably.channels.get('emotion-voting');

        channel.subscribe('update_labels', (msg) => {
            const dataList = msg.data.data;
            dataList.forEach(item => {
                const el = document.getElementById(`t${item.index}`);
                if (el) el.innerText = item.emotion;
            });
        });

        function vote(choice, element) {
            const msgEl = document.getElementById('msg');
            const container = document.getElementById('main-grid');
            
            // 暫時鎖定畫面防止重複點擊
            container.classList.add('disabled');
            msgEl.innerText = "傳送中...";

            channel.publish('update', { choice: choice }, (err) => {
                if (err) {
                    msgEl.innerText = "失敗，請重試";
                    msgEl.style.color = "#FF5252";
                    container.classList.remove('disabled');
                } else {
                    msgEl.innerText = "✅ 投票成功";
                    msgEl.style.color = "#4CAF50";
                    setTimeout(() => {
                        container.classList.remove('disabled');
                        msgEl.innerText = "";
                    }, 2000);
                }
            });
        }
    </script>
</body>
</html>
