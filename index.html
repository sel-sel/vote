<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共感戰場 - 投票區</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { 
            font-family: 'Microsoft JhengHei', sans-serif; 
            background-color: #1a1a1a; 
            color: white; 
            text-align: center; 
            margin: 0; 
            padding: 10px; 
        }
        h2 { color: #F1C40F; margin-top: 5px; margin-bottom: 15px; }
        
        /* 1. 情境顯示區塊 */
        #scenario-display { 
            background: #2c3e50; 
            padding: 15px; 
            border-radius: 8px; 
            margin: 0 auto 15px auto; 
            max-width: 450px; 
            display: none; 
            text-align: left; 
            border-left: 6px solid #F1C40F; 
        }
        #sd-role { font-size: 0.9em; margin-bottom: 8px; font-weight: bold; }
        #sd-text { font-size: 1.1em; line-height: 1.4; color: #FFF; }

        /* 2. 恢復原本乾淨的六角形圖片 */
        #voting-map { 
            width: 100%; 
            max-width: 350px; 
            margin: 0 auto 15px auto; 
        }
        #voting-map img { width: 100%; display: block; border-radius: 10px; }
        
        /* 3. 從 Python 傳過來的文字選項區塊 */
        #options-display {
            background: #222;
            padding: 10px;
            border-radius: 8px;
            max-width: 450px;
            margin: 0 auto 20px auto;
        }
        #options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        .option-box {
            background: #333;
            padding: 8px 5px;
            border-radius: 6px;
            font-size: 0.95em;
        }

        /* 投票按鈕區塊 */
        .btn-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            max-width: 400px; 
            margin: auto; 
        }
        button {
            padding: 15px; 
            font-size: 18px; 
            font-weight: bold; 
            border: none; 
            border-radius: 8px;
            background-color: #2980b9; 
            color: white; 
            cursor: pointer; 
            box-shadow: 0 4px #1f6391;
        }
        button:active { box-shadow: 0 0 #1f6391; transform: translateY(4px); }
    </style>
</head>
<body>

    <h2>🎭 共感戰場 - 學生端</h2>
    
    <div id="scenario-display">
        <div id="sd-role"></div>
        <div id="sd-text">等待老師觸發情境...</div>
    </div>

    <div id="voting-map">
        <img src="hexagon_base.png" alt="六角形底圖">
    </div>

    <div id="options-display">
        <div style="color: #F1C40F; font-weight: bold; font-size: 1.1em;">📊 目前對應選項與票數</div>
        <div id="options-grid">
            <div style="grid-column: span 3; color: #aaa;">等待老師抽籤...</div>
        </div>
    </div>

    <div class="btn-grid">
        <button onclick="vote('①')">投給 ①</button>
        <button onclick="vote('②')">投給 ②</button>
        <button onclick="vote('③')">投給 ③</button>
        <button onclick="vote('④')">投給 ④</button>
        <button onclick="vote('⑤')">投給 ⑤</button>
        <button onclick="vote('⑥')">投給 ⑥</button>
    </div>

    <script>
        const API_KEY = 'bHcXGQ.1E5LxA:MTgbAhdb5kDHqeL91xshPWSuAqZihv_SMGB0693bBZE';
        const realtime = new Ably.Realtime(API_KEY);
        const channel = realtime.channels.get('emotion-voting');

        // 接收 Python 傳來的 6 個選項文字與票數
        channel.subscribe('update_labels', (msg) => {
            const dataList = msg.data.data;
            const grid = document.getElementById('options-grid');
            grid.innerHTML = ''; // 清空舊選項
            
            dataList.forEach(item => {
                const box = document.createElement('div');
                box.className = 'option-box';
                box.innerHTML = `<span style="color: #00BFFF; font-weight: bold;">${item.label}</span><br>
                                 <span style="font-weight: bold;">${item.emotion}</span><br>
                                 <span style="color: #d32f2f; font-size: 0.9em;">(${item.count}票)</span>`;
                grid.appendChild(box);
            });
        });

        // 接收 Python 傳來的情境
        channel.subscribe('sync_scenario', (msg) => {
            const box = document.getElementById('scenario-display');
            box.style.display = 'block'; 
            box.style.borderLeftColor = msg.data.color; 
            document.getElementById('sd-role').innerText = msg.data.role_intro;
            document.getElementById('sd-role').style.color = msg.data.color;
            document.getElementById('sd-text').innerText = msg.data.scenario_text;
        });

        function vote(choice) {
            channel.publish('update', { choice: choice }, (err) => {
                if (err) alert('投票失敗，請檢查網路');
                else if (navigator.vibrate) navigator.vibrate(50);
            });
        }
    </script>
</body>
</html>
