<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情緒投票系統-六角排列版</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 10px; overflow-x: hidden; }
        h2 { margin: 15px 0; font-size: 1.2rem; color: #F1C40F; }
        
        .hexagon-container {
            position: relative;
            width: 340px;
            height: 380px;
            margin: 20px auto;
        }

        .vote-card {
            position: absolute;
            width: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 保留原本的座標位置 */
        .pos1 { top: 0px; left: 120px; }
        .pos2 { top: 75px; left: 230px; }
        .pos3 { top: 225px; left: 230px; }
        .pos4 { bottom: 0px; left: 120px; }
        .pos5 { top: 225px; left: 10px; }
        .pos6 { top: 75px; left: 10px; }

        .emotion-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #444;
            margin-bottom: 5px;
            background: #333;
        }

        /* 新增：專門放 Python 傳過來字樣的空間 */
        .dynamic-text {
            font-size: 16px;
            font-weight: bold;
            color: #00BFFF;
            margin-top: 5px;
            height: 22px; /* 固定高度防止跳動 */
            text-shadow: 1px 1px 2px black;
        }

        button { 
            width: 60px;
            height: 45px; 
            font-size: 20px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            color: white; 
            font-weight: bold; 
        }
        
        button:active { transform: scale(0.9); }
        button:disabled { background: #555 !important; color: #888; }
        
        .btn1 { background: #FF5252; } .btn2 { background: #FF9800; }
        .btn3 { background: #F1C40F; color: black; } .btn4 { background: #4CAF50; }
        .btn5 { background: #2196F3; } .btn6 { background: #9C27B0; }
        
        #msg { font-size: 18px; margin-top: 10px; height: 25px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>請根據大螢幕情境投票</h2>
    
    <div class="hexagon-container">
        <div class="vote-card pos1"><img src="fig1.jpg" class="emotion-img"><button class="btn1" onclick="vote('①')">①</button><div id="t0" class="dynamic-text"></div></div>
        <div class="vote-card pos2"><img src="fig2.jpg" class="emotion-img"><button class="btn2" onclick="vote('②')">②</button><div id="t1" class="dynamic-text"></div></div>
        <div class="vote-card pos3"><img src="fig3.jpg" class="emotion-img"><button class="btn3" onclick="vote('③')">③</button><div id="t2" class="dynamic-text"></div></div>
        <div class="vote-card pos4"><img src="fig4.jpg" class="emotion-img"><button class="btn4" onclick="vote('④')">④</button><div id="t3" class="dynamic-text"></div></div>
        <div class="vote-card pos5"><img src="fig5.jpg" class="emotion-img"><button class="btn5" onclick="vote('⑤')">⑤</button><div id="t4" class="dynamic-text"></div></div>
        <div class="vote-card pos6"><img src="fig6.jpg" class="emotion-img"><button class="btn6" onclick="vote('⑥')">⑥</button><div id="t5" class="dynamic-text"></div></div>
    </div>

    <p id="msg"></p>

    <script>
        const ABLY_KEY = 'bHcXGQ.1E5LxA:MTgbAhdb5kDHqeL91xshPWSuAqZihv_SMGB0693bBZE';
        const ably = new Ably.Realtime(ABLY_KEY);
        const channel = ably.channels.get('emotion-voting');

        // 接收 Python 傳過來的情緒文字
        channel.subscribe('update_labels', (msg) => {
            const dataList = msg.data.data;
            dataList.forEach(item => {
                const el = document.getElementById(`t${item.index}`);
                if (el) el.innerText = item.emotion;
            });
        });

        function vote(choice) {
            const msgEl = document.getElementById('msg');
            const btns = document.querySelectorAll('button');
            btns.forEach(b => b.disabled = true);
            msgEl.innerText = "傳送中...";

            channel.publish('update', { choice: choice }, (err) => {
                if (err) {
                    msgEl.innerText = "失敗";
                    msgEl.style.color = "#FF5252";
                    btns.forEach(b => b.disabled = false);
                } else {
                    msgEl.innerText = "✅ 成功投給 " + choice;
                    msgEl.style.color = "#4CAF50";
                    setTimeout(() => {
                        btns.forEach(b => b.disabled = false);
                        msgEl.innerText = "";
                    }, 2000);
                }
            });
        }
    </script>
</body>
</html>
